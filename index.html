<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jangoes - Speed | Safe | Reliable</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=block" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
  <script>
    window.process = { env: { API_KEY: '' } };
    
    function showFatalError(message) {
      console.error("Jangoes Fatal:", message);
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `
          <div style="padding: 40px; font-family: sans-serif; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fff1f2;">
            <div style="background: white; padding: 32px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 400px; border: 2px solid #fecaca;">
              <h2 style="color: #991b1b; margin-bottom: 8px; font-weight: 800;">System Error</h2>
              <p style="color: #b91c1c; font-size: 13px; font-family: monospace;">${message}</p>
              <button onclick="location.reload()" style="margin-top: 20px; width: 100%; padding: 12px; background: #2B59A2; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer;">RELOAD APP</button>
            </div>
          </div>
        `;
      }
    }

    window.onerror = function(msg) { showFatalError(msg); return false; };
    window.onunhandledrejection = function(event) { showFatalError(event.reason); };

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: "#2B59A2",
            "primary-dark": "#1E3F74",
            accent: "#86BC71",
            "accent-dark": "#75A661",
            "background-light": "#f5f7f8",
            "background-dark": "#0f1723",
            "surface-light": "#ffffff",
            "surface-dark": "#1a2230",
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-weight: normal !important;
      font-style: normal !important;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important;
    }
    
    .material-symbols-outlined.filled {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important;
    }

    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #ffffff; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    #root { min-height: 100vh; }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
    "react-router-dom": "https://esm.sh/react-router-dom@6.28.0?external=react,react-dom",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-white dark:bg-background-dark text-slate-900 dark:text-slate-100">
  <div id="root">
    <div class="flex items-center justify-center h-screen bg-white">
      <div class="flex flex-col items-center gap-6">
        <div class="relative flex items-center justify-center">
          <div class="absolute w-20 h-20 border-4 border-primary/10 rounded-full"></div>
          <div class="absolute w-20 h-20 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
          <span class="material-symbols-outlined text-primary text-3xl">local_shipping</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <span class="font-black text-2xl tracking-tighter text-primary">JANGOES.COM</span>
          <span class="text-[9px] font-black text-accent uppercase tracking-[0.3em] animate-pulse">Establishing Session...</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
