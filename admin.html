<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jangoes Admin Panel</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=block" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2B59A2",
            "primary-dark": "#1E3F74",
            "primary-darker": "#162d57",
            accent: "#86BC71",
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-weight: normal !important;
      font-style: normal !important;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important;
    }
    .material-symbols-outlined.filled {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24 !important;
    }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background-color: #f5f7f8; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 text-slate-900">
  <div id="admin-root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1E3F74;">
      <div style="text-align:center;color:white;">
        <div style="font-size:32px;font-weight:900;letter-spacing:-1px;">JANGOES</div>
        <div style="font-size:11px;font-weight:700;letter-spacing:4px;opacity:0.6;margin-top:4px;">ADMIN PANEL</div>
      </div>
    </div>
  </div>
  <script type="module" src="/admin/main.tsx"></script>
</body>
</html>
